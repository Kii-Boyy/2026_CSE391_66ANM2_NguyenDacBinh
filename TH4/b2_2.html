<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Đặt Hàng Có Validation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    form, .confirm-box, .success-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
      margin-top: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    input.error-border,
    select.error-border,
    textarea.error-border {
      border-color: red;
    }

    input.success-border,
    select.success-border,
    textarea.success-border {
      border-color: green;
    }

    .error {
      display: block;
      color: red;
      font-size: 14px;
      margin-top: 5px;
      min-height: 18px;
    }

    .counter {
      text-align: right;
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    .counter.over-limit {
      color: red;
      font-weight: bold;
    }

    .radio-group label {
      display: inline-block;
      font-weight: normal;
      margin-right: 15px;
    }

    .total-box {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #007bff;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-submit {
      background: #007bff;
    }

    .btn-submit:hover {
      background: #0056b3;
    }

    .btn-confirm {
      background: green;
    }

    .btn-cancel {
      background: #dc3545;
    }

    .confirm-box,
    .success-box {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Form Đặt Hàng Trực Tuyến</h2>

  <form id="orderForm">
    <div class="form-group">
      <label for="product">Tên sản phẩm</label>
      <select id="product">
        <option value="">-- Chọn sản phẩm --</option>
        <option value="Áo">Áo</option>
        <option value="Quần">Quần</option>
        <option value="Giày">Giày</option>
        <option value="Túi">Túi</option>
      </select>
      <span class="error" id="productError"></span>
    </div>

    <div class="form-group">
      <label for="quantity">Số lượng</label>
      <input type="number" id="quantity" min="1" max="99" />
      <span class="error" id="quantityError"></span>
    </div>

    <div class="form-group">
      <label for="deliveryDate">Ngày giao hàng</label>
      <input type="date" id="deliveryDate" />
      <span class="error" id="deliveryDateError"></span>
    </div>

    <div class="form-group">
      <label for="address">Địa chỉ giao</label>
      <textarea id="address" rows="3"></textarea>
      <span class="error" id="addressError"></span>
    </div>

    <div class="form-group">
      <label for="note">Ghi chú</label>
      <textarea id="note" rows="4"></textarea>
      <div class="counter" id="noteCounter">0/200</div>
      <span class="error" id="noteError"></span>
    </div>

    <div class="form-group">
      <label>Phương thức thanh toán</label>
      <div class="radio-group">
        <label><input type="radio" name="payment" value="COD" /> COD</label>
        <label><input type="radio" name="payment" value="Chuyển khoản" /> Chuyển khoản</label>
        <label><input type="radio" name="payment" value="Ví điện tử" /> Ví điện tử</label>
      </div>
      <span class="error" id="paymentError"></span>
    </div>

    <div class="total-box" id="totalBox">Tổng tiền: 0 VNĐ</div>

    <button type="submit" class="btn-submit">Đặt hàng</button>
  </form>

  <div class="confirm-box" id="confirmBox">
    <h3>Xác nhận đặt hàng</h3>
    <div id="orderSummary"></div>
    <p><strong>Xác nhận đặt hàng?</strong></p>
    <button type="button" class="btn-confirm" id="confirmBtn">Xác nhận</button>
    <button type="button" class="btn-cancel" id="cancelBtn">Hủy</button>
  </div>

  <div class="success-box" id="successBox"></div>

  <script>
    const orderForm = document.getElementById("orderForm");
    const product = document.getElementById("product");
    const quantity = document.getElementById("quantity");
    const deliveryDate = document.getElementById("deliveryDate");
    const address = document.getElementById("address");
    const note = document.getElementById("note");
    const noteCounter = document.getElementById("noteCounter");
    const totalBox = document.getElementById("totalBox");
    const confirmBox = document.getElementById("confirmBox");
    const orderSummary = document.getElementById("orderSummary");
    const successBox = document.getElementById("successBox");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    const prices = {
      "Áo": 150000,
      "Quần": 200000,
      "Giày": 500000,
      "Túi": 300000
    };

    function showError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");

      if (field) {
        field.classList.add("error-border");
        field.classList.remove("success-border");
      }

      error.textContent = message;
    }

    function clearError(fieldId) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");

      if (field) {
        field.classList.remove("error-border");
        field.classList.remove("success-border");
      }

      error.textContent = "";
    }

    function showSuccess(fieldId) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");

      if (field) {
        field.classList.remove("error-border");
        field.classList.add("success-border");
      }

      error.textContent = "";
    }

    function formatMoney(number) {
      return Number(number).toLocaleString("vi-VN") + " VNĐ";
    }

    function updateTotal() {
      const selectedProduct = product.value;
      const qty = Number(quantity.value);

      if (selectedProduct && Number.isInteger(qty) && qty >= 1 && qty <= 99) {
        const total = prices[selectedProduct] * qty;
        totalBox.textContent = "Tổng tiền: " + formatMoney(total);
      } else {
        totalBox.textContent = "Tổng tiền: 0 VNĐ";
      }
    }

    function validateProduct() {
      if (product.value === "") {
        showError("product", "Vui lòng chọn sản phẩm");
        return false;
      }

      showSuccess("product");
      return true;
    }

    function validateQuantity() {
      const value = quantity.value.trim();
      const qty = Number(value);

      if (value === "") {
        showError("quantity", "Số lượng không được để trống");
        return false;
      }

      if (!Number.isInteger(qty) || qty < 1 || qty > 99) {
        showError("quantity", "Số lượng phải là số nguyên từ 1 đến 99");
        return false;
      }

      showSuccess("quantity");
      return true;
    }

    function validateDeliveryDate() {
      const value = deliveryDate.value;

      if (value === "") {
        showError("deliveryDate", "Vui lòng chọn ngày giao hàng");
        return false;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const maxDate = new Date();
      maxDate.setHours(0, 0, 0, 0);
      maxDate.setDate(maxDate.getDate() + 30);

      const selectedDate = new Date(value);
      selectedDate.setHours(0, 0, 0, 0);

      if (selectedDate < today) {
        showError("deliveryDate", "Ngày giao hàng không được trong quá khứ");
        return false;
      }

      if (selectedDate > maxDate) {
        showError("deliveryDate", "Ngày giao hàng không được quá 30 ngày từ hôm nay");
        return false;
      }

      showSuccess("deliveryDate");
      return true;
    }

    function validateAddress() {
      const value = address.value.trim();

      if (value === "") {
        showError("address", "Địa chỉ giao không được để trống");
        return false;
      }

      if (value.length < 10) {
        showError("address", "Địa chỉ giao phải có ít nhất 10 ký tự");
        return false;
      }

      showSuccess("address");
      return true;
    }

    function validateNote() {
      const value = note.value.trim();

      if (value.length > 200) {
        showError("note", "Ghi chú không được vượt quá 200 ký tự");
        return false;
      }

      showSuccess("note");
      return true;
    }

    function validatePayment() {
      const payment = document.querySelector('input[name="payment"]:checked');

      if (!payment) {
        document.getElementById("paymentError").textContent = "Vui lòng chọn phương thức thanh toán";
        return false;
      }

      document.getElementById("paymentError").textContent = "";
      return true;
    }

    function updateNoteCounter() {
      const length = note.value.length;
      noteCounter.textContent = `${length}/200`;

      if (length > 200) {
        noteCounter.classList.add("over-limit");
      } else {
        noteCounter.classList.remove("over-limit");
      }
    }

    product.addEventListener("change", function () {
      validateProduct();
      updateTotal();
    });

    quantity.addEventListener("blur", validateQuantity);
    quantity.addEventListener("input", function () {
      clearError("quantity");
      updateTotal();
    });
    
    deliveryDate.addEventListener("change", validateDeliveryDate);
    address.addEventListener("blur", validateAddress);
    note.addEventListener("blur", validateNote);

    address.addEventListener("input", function () {
      clearError("address");
    });

    note.addEventListener("input", function () {
      clearError("note");
      updateNoteCounter();
      validateNote();
    });

    product.addEventListener("input", function () {
      clearError("product");
    });

    deliveryDate.addEventListener("input", function () {
      clearError("deliveryDate");
    });

    document.querySelectorAll('input[name="payment"]').forEach(function (radio) {
      radio.addEventListener("change", validatePayment);
    });

    orderForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const isValid =
        validateProduct() &
        validateQuantity() &
        validateDeliveryDate() &
        validateAddress() &
        validateNote() &
        validatePayment();

      if (isValid) {
        const selectedPayment = document.querySelector('input[name="payment"]:checked').value;
        const total = prices[product.value] * Number(quantity.value);

        orderSummary.innerHTML = `
          <p><strong>Sản phẩm:</strong> ${product.value}</p>
          <p><strong>Số lượng:</strong> ${quantity.value}</p>
          <p><strong>Tổng tiền:</strong> ${formatMoney(total)}</p>
          <p><strong>Ngày giao:</strong> ${deliveryDate.value}</p>
          <p><strong>Địa chỉ:</strong> ${address.value.trim()}</p>
          <p><strong>Thanh toán:</strong> ${selectedPayment}</p>
        `;

        confirmBox.style.display = "block";
      }
    });

    confirmBtn.addEventListener("click", function () {
      orderForm.style.display = "none";
      confirmBox.style.display = "none";
      successBox.style.display = "block";

      const total = prices[product.value] * Number(quantity.value);

      successBox.innerHTML = `
        <h3>Đặt hàng thành công! </h3>
        <p>Bạn đã đặt <strong>${product.value}</strong> với số lượng <strong>${quantity.value}</strong>.</p>
        <p>Tổng tiền: <strong>${formatMoney(total)}</strong></p>
        <p>Ngày giao dự kiến: <strong>${deliveryDate.value}</strong></p>
      `;
    });

    cancelBtn.addEventListener("click", function () {
      confirmBox.style.display = "none";
    });

    updateNoteCounter();
    updateTotal();
  </script>
</body>
</html>
