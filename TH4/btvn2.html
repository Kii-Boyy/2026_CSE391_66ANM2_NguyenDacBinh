<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-step Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 750px;
      margin: 30px auto;
      padding: 20px;
      background: #f4f6f9;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    .progress-text {
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      width: 33.33%;
      background: #007bff;
      transition: 0.3s;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="date"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .error {
      color: red;
      font-size: 14px;
      display: block;
      margin-top: 5px;
      min-height: 18px;
    }

    .error-border {
      border-color: red !important;
    }

    .success-border {
      border-color: green !important;
    }

    .radio-group label {
      display: inline-block;
      margin-right: 15px;
      font-weight: normal;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-prev {
      background: #6c757d;
    }

    .btn-next {
      background: #007bff;
    }

    .btn-submit {
      background: green;
    }

    .summary-box {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.8;
    }

    #successMessage {
      display: none;
      margin-top: 20px;
      background: #d4edda;
      color: #155724;
      padding: 20px;
      border: 1px solid #c3e6cb;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Form Đăng Ký Nhiều Bước</h2>

  <div class="form-container">
    <div class="progress-text" id="progressText">Bước 1 / 3</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <form id="multiStepForm">
      <!-- Bước 1 -->
      <div class="step active" id="step1">
        <div class="form-group">
          <label for="fullname">Họ tên</label>
          <input type="text" id="fullname" />
          <span class="error" id="fullnameError"></span>
        </div>

        <div class="form-group">
          <label for="birthdate">Ngày sinh</label>
          <input type="date" id="birthdate" />
          <span class="error" id="birthdateError"></span>
        </div>

        <div class="form-group">
          <label>Giới tính</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="Nam" /> Nam</label>
            <label><input type="radio" name="gender" value="Nữ" /> Nữ</label>
            <label><input type="radio" name="gender" value="Khác" /> Khác</label>
          </div>
          <span class="error" id="genderError"></span>
        </div>

        <div class="buttons">
          <button type="button" class="btn-next" id="next1">Tiếp theo</button>
        </div>
      </div>

      <!-- Bước 2 -->
      <div class="step" id="step2">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" id="email" />
          <span class="error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" />
          <span class="error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" />
          <span class="error" id="confirmPasswordError"></span>
        </div>

        <div class="buttons">
          <button type="button" class="btn-prev" id="prev2">Quay lại</button>
          <button type="button" class="btn-next" id="next2">Tiếp theo</button>
        </div>
      </div>

      <!-- Bước 3 -->
      <div class="step" id="step3">
        <h3>Xác nhận thông tin</h3>
        <div class="summary-box" id="summaryBox"></div>

        <div class="buttons">
          <button type="button" class="btn-prev" id="prev3">Quay lại</button>
          <button type="submit" class="btn-submit">Hoàn tất đăng ký</button>
        </div>
      </div>
    </form>

    <div id="successMessage"></div>
  </div>

  <script>
    const form = document.getElementById("multiStepForm");
    const steps = document.querySelectorAll(".step");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const summaryBox = document.getElementById("summaryBox");
    const successMessage = document.getElementById("successMessage");

    const fullname = document.getElementById("fullname");
    const birthdate = document.getElementById("birthdate");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    let currentStep = 1;

    const nameRegex = /^[a-zA-ZÀ-ỹ\s]+$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    function showStep(stepNumber) {
      steps.forEach(step => step.classList.remove("active"));
      document.getElementById(`step${stepNumber}`).classList.add("active");

      progressText.textContent = `Bước ${stepNumber} / 3`;
      progressFill.style.width = `${(stepNumber / 3) * 100}%`;

      currentStep = stepNumber;

      if (stepNumber === 3) {
        renderSummary();
      }
    }

    function showError(input, errorId, message) {
      if (input) {
        input.classList.add("error-border");
        input.classList.remove("success-border");
      }
      document.getElementById(errorId).textContent = message;
    }

    function showSuccess(input, errorId) {
      if (input) {
        input.classList.remove("error-border");
        input.classList.add("success-border");
      }
      document.getElementById(errorId).textContent = "";
    }

    function clearError(input, errorId) {
      if (input) {
        input.classList.remove("error-border");
        input.classList.remove("success-border");
      }
      document.getElementById(errorId).textContent = "";
    }

    function validateFullname() {
      const value = fullname.value.trim();

      if (value === "") {
        showError(fullname, "fullnameError", "Họ tên không được để trống");
        return false;
      }

      if (value.length < 3) {
        showError(fullname, "fullnameError", "Họ tên phải có ít nhất 3 ký tự");
        return false;
      }

      if (!nameRegex.test(value)) {
        showError(fullname, "fullnameError", "Họ tên chỉ chứa chữ và khoảng trắng");
        return false;
      }

      showSuccess(fullname, "fullnameError");
      return true;
    }

    function validateBirthdate() {
      const value = birthdate.value;

      if (value === "") {
        showError(birthdate, "birthdateError", "Vui lòng chọn ngày sinh");
        return false;
      }

      const selectedDate = new Date(value);
      const today = new Date();

      if (selectedDate > today) {
        showError(birthdate, "birthdateError", "Ngày sinh không hợp lệ");
        return false;
      }

      showSuccess(birthdate, "birthdateError");
      return true;
    }

    function validateGender() {
      const selected = document.querySelector('input[name="gender"]:checked');

      if (!selected) {
        document.getElementById("genderError").textContent = "Vui lòng chọn giới tính";
        return false;
      }

      document.getElementById("genderError").textContent = "";
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();

      if (value === "") {
        showError(email, "emailError", "Email không được để trống");
        return false;
      }

      if (!emailRegex.test(value)) {
        showError(email, "emailError", "Email không đúng định dạng");
        return false;
      }

      showSuccess(email, "emailError");
      return true;
    }

    function validatePassword() {
      const value = password.value;

      if (value === "") {
        showError(password, "passwordError", "Mật khẩu không được để trống");
        return false;
      }

      if (!passwordRegex.test(value)) {
        showError(password, "passwordError", "Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường, số");
        return false;
      }

      showSuccess(password, "passwordError");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError(confirmPassword, "confirmPasswordError", "Vui lòng nhập xác nhận mật khẩu");
        return false;
      }

      if (value !== password.value) {
        showError(confirmPassword, "confirmPasswordError", "Mật khẩu xác nhận không khớp");
        return false;
      }

      showSuccess(confirmPassword, "confirmPasswordError");
      return true;
    }

    function validateStep1() {
      return validateFullname() & validateBirthdate() & validateGender();
    }

    function validateStep2() {
      return validateEmail() & validatePassword() & validateConfirmPassword();
    }

    function renderSummary() {
      const gender = document.querySelector('input[name="gender"]:checked')?.value || "";

      summaryBox.innerHTML = `
        <p><strong>Họ tên:</strong> ${fullname.value.trim()}</p>
        <p><strong>Ngày sinh:</strong> ${birthdate.value}</p>
        <p><strong>Giới tính:</strong> ${gender}</p>
        <p><strong>Email:</strong> ${email.value.trim()}</p>
      `;
    }

    document.getElementById("next1").addEventListener("click", function () {
      if (validateStep1()) {
        showStep(2);
      }
    });

    document.getElementById("next2").addEventListener("click", function () {
      if (validateStep2()) {
        showStep(3);
      }
    });

    document.getElementById("prev2").addEventListener("click", function () {
      showStep(1);
    });

    document.getElementById("prev3").addEventListener("click", function () {
      showStep(2);
    });

    fullname.addEventListener("blur", validateFullname);
    birthdate.addEventListener("change", validateBirthdate);
    email.addEventListener("blur", validateEmail);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", () => clearError(fullname, "fullnameError"));
    birthdate.addEventListener("input", () => clearError(birthdate, "birthdateError"));
    email.addEventListener("input", () => clearError(email, "emailError"));
    password.addEventListener("input", () => {
      clearError(password, "passwordError");
      clearError(confirmPassword, "confirmPasswordError");
    });
    confirmPassword.addEventListener("input", () => clearError(confirmPassword, "confirmPasswordError"));

    document.querySelectorAll('input[name="gender"]').forEach(radio => {
      radio.addEventListener("change", validateGender);
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      if (validateStep2()) {
        form.style.display = "none";
        successMessage.style.display = "block";
        successMessage.innerHTML = `
          <h3>Đăng ký thành công! 🎉</h3>
          <p>Chào mừng <strong>${fullname.value.trim()}</strong></p>
          <p>Email: <strong>${email.value.trim()}</strong></p>
        `;
      }
    });
  </script>
</body>
</html>
