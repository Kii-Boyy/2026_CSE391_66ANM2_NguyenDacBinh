<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nâng cấp Form Đăng Ký</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      background: #f4f6f9;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .input-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      font-size: 18px;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 5px;
      display: block;
      min-height: 18px;
    }

    .success-border {
      border-color: green !important;
    }

    .error-border {
      border-color: red !important;
    }

    .counter {
      text-align: right;
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    .strength-box {
      margin-top: 8px;
    }

    .strength-bar {
      width: 100%;
      height: 10px;
      background: #ddd;
      border-radius: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .strength-text {
      margin-top: 5px;
      font-size: 14px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    #successMessage {
      display: none;
      margin-top: 20px;
      background: #d4edda;
      color: #155724;
      padding: 20px;
      border: 1px solid #c3e6cb;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Form Đăng Ký Nâng Cấp</h2>

  <form id="registerForm">
    <div class="form-group">
      <label for="fullname">Họ và tên</label>
      <input type="text" id="fullname" maxlength="50" />
      <div class="counter" id="nameCounter">0/50</div>
      <span class="error" id="fullnameError"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="text" id="email" />
      <span class="error" id="emailError"></span>
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <div class="input-wrapper">
        <input type="password" id="password" />
        <span class="toggle-password" id="togglePassword">👁</span>
      </div>

      <div class="strength-box">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-text" id="strengthText">Chưa nhập mật khẩu</div>
      </div>

      <span class="error" id="passwordError"></span>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Xác nhận mật khẩu</label>
      <input type="password" id="confirmPassword" />
      <span class="error" id="confirmPasswordError"></span>
    </div>

    <button type="submit">Đăng ký</button>
  </form>

  <div id="successMessage"></div>

  <script>
    const form = document.getElementById("registerForm");
    const fullname = document.getElementById("fullname");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    const fullnameError = document.getElementById("fullnameError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const confirmPasswordError = document.getElementById("confirmPasswordError");

    const nameCounter = document.getElementById("nameCounter");
    const togglePassword = document.getElementById("togglePassword");
    const strengthFill = document.getElementById("strengthFill");
    const strengthText = document.getElementById("strengthText");
    const successMessage = document.getElementById("successMessage");

    const nameRegex = /^[a-zA-ZÀ-ỹ\s]+$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    function showError(input, errorEl, message) {
      input.classList.add("error-border");
      input.classList.remove("success-border");
      errorEl.textContent = message;
    }

    function showSuccess(input, errorEl) {
      input.classList.remove("error-border");
      input.classList.add("success-border");
      errorEl.textContent = "";
    }

    function clearError(input, errorEl) {
      input.classList.remove("error-border");
      input.classList.remove("success-border");
      errorEl.textContent = "";
    }

    function validateFullname() {
      const value = fullname.value.trim();

      if (value === "") {
        showError(fullname, fullnameError, "Họ và tên không được để trống");
        return false;
      }

      if (value.length < 3) {
        showError(fullname, fullnameError, "Họ và tên phải có ít nhất 3 ký tự");
        return false;
      }

      if (!nameRegex.test(value)) {
        showError(fullname, fullnameError, "Họ và tên chỉ chứa chữ cái và khoảng trắng");
        return false;
      }

      showSuccess(fullname, fullnameError);
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();

      if (value === "") {
        showError(email, emailError, "Email không được để trống");
        return false;
      }

      if (!emailRegex.test(value)) {
        showError(email, emailError, "Email không đúng định dạng");
        return false;
      }

      showSuccess(email, emailError);
      return true;
    }

    function validatePassword() {
      const value = password.value;

      if (value === "") {
        showError(password, passwordError, "Mật khẩu không được để trống");
        return false;
      }

      if (!passwordRegex.test(value)) {
        showError(password, passwordError, "Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường, số");
        return false;
      }

      showSuccess(password, passwordError);
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError(confirmPassword, confirmPasswordError, "Vui lòng nhập xác nhận mật khẩu");
        return false;
      }

      if (value !== password.value) {
        showError(confirmPassword, confirmPasswordError, "Mật khẩu xác nhận không khớp");
        return false;
      }

      showSuccess(confirmPassword, confirmPasswordError);
      return true;
    }

    function updateNameCounter() {
      nameCounter.textContent = `${fullname.value.length}/50`;
    }

    function updatePasswordStrength() {
      const value = password.value;
      let score = 0;

      if (value.length >= 8) score++;
      if (/[a-z]/.test(value)) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/\d/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;

      if (value.length === 0) {
        strengthFill.style.width = "0%";
        strengthFill.style.background = "transparent";
        strengthText.textContent = "Chưa nhập mật khẩu";
        return;
      }

      if (score <= 2) {
        strengthFill.style.width = "33%";
        strengthFill.style.background = "red";
        strengthText.textContent = "Mức độ mạnh: Yếu";
        strengthText.style.color = "red";
      } else if (score <= 4) {
        strengthFill.style.width = "66%";
        strengthFill.style.background = "orange";
        strengthText.textContent = "Mức độ mạnh: Trung bình";
        strengthText.style.color = "orange";
      } else {
        strengthFill.style.width = "100%";
        strengthFill.style.background = "green";
        strengthText.textContent = "Mức độ mạnh: Mạnh";
        strengthText.style.color = "green";
      }
    }

    togglePassword.addEventListener("click", function () {
      if (password.type === "password") {
        password.type = "text";
        confirmPassword.type = "text";
      } else {
        password.type = "password";
        confirmPassword.type = "password";
      }
    });

    fullname.addEventListener("blur", validateFullname);
    email.addEventListener("blur", validateEmail);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", function () {
      clearError(fullname, fullnameError);
      updateNameCounter();
    });

    email.addEventListener("input", function () {
      clearError(email, emailError);
    });

    password.addEventListener("input", function () {
      clearError(password, passwordError);
      clearError(confirmPassword, confirmPasswordError);
      updatePasswordStrength();
    });

    confirmPassword.addEventListener("input", function () {
      clearError(confirmPassword, confirmPasswordError);
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const isValid =
        validateFullname() &
        validateEmail() &
        validatePassword() &
        validateConfirmPassword();

      if (isValid) {
        form.style.display = "none";
        successMessage.style.display = "block";
        successMessage.innerHTML = `
          <h3>Đăng ký thành công! </h3>
          <p>Xin chào <strong>${fullname.value.trim()}</strong></p>
        `;
      }
    });

    updateNameCounter();
    updatePasswordStrength();
  </script>
</body>
</html>
